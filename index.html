<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quotes Generator</title>

    <link rel="stylesheet" href="assets/css/styles.css" />

    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
  </head>

  <body>
    <div class="background"></div>

    <div class="container">

      <header class="header">
        <h1>AI Quotes Generator</h1>
        <p class="subtitle">Type a topic and get an AI-generated quote ✨</p>
      </header>

      <main class="card">

        <div class="quick-topics">
          <button data-topic="Love">❤️ Love</button>
          <button data-topic="Success">🚀 Success</button>
          <button data-topic="Motivation">💪 Motivation</button>
          <button data-topic="Life">🌱 Life</button>
        </div>

        <form id="form" class="form">
          <input
            class="search-input"
            type="text"
            placeholder="Try: Love, Success, Music..."
            autocomplete="off"
            required
          />
          <button type="submit" class="submit-button">
            Generate
          </button>
        </form>

        <div class="alert hidden"></div>

        <div class="controls">
          <select id="language">
            <option value="English">English</option>
            <option value="French">French</option>
            <option value="Spanish">Spanish</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Italian">Italian</option>
            <option value="German">German</option>
          </select>

          <button id="toggle-theme">🌙</button>
        </div>

        <div class="actions hidden">
          <button id="speak">🔊 Speak</button>
          <button id="explain">🧠 Explain</button>
          <button id="regenerate">🔁 Regenerate</button>
          <button id="favorite">⭐ Save</button>
        </div>

        <div class="hint">Examples: Love • Friendship • Motivation • Family</div>

        <div class="quote hidden"></div>

        <h2>Explanation</h2>
        <div class="explanation hidden"></div>

        <h2>History</h2>
        <div class="history"></div>

        <h2>📊 Analytics Dashboard</h2>

        <div class="dashboard">
          <canvas id="topicsChart"></canvas>

          <div class="stats">
            <p>🔥 Daily Streak: <span id="streak">0</span></p>
            <p>⭐ Favorites: <span id="favoritesCount">0</span></p>
            <p>🧾 Total Quotes: <span id="totalCount">0</span></p>
          </div>

          <div class="favorites-list"></div>
        </div>

      </main>

      <footer class="footer">
        Coded by
        <a href="https://github.com/yvonnesarah" target="_blank">Yvonne Adedeji</a>
        • Open source on
        <a href="https://github.com/yvonnesarah/ai-generator" target="_blank">GitHub</a>
        • Hosted on
        <a href="https://ya-ai-generator.netlify.app/" target="_blank">Netlify</a>
      </footer>

    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
